<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>KVENTA SYSTEM</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<div id="bg"></div>

<!-- AUTH -->
<div id="auth">
  <div class="panel">

    <h1>АВТОРИЗАЦИЯ</h1>

    <input id="login" placeholder="Никнейм">
    <input id="password" type="password" placeholder="Пароль">

    <button id="login-btn">ВОЙТИ</button>
    <button id="guest-btn">ГОСТЬ</button>

  </div>
</div>

<!-- MAIN SYSTEM -->
<div id="main">

  <div id="sidebar">
    <button data-tab="profile" class="active">Профиль</button>
    <button data-tab="agents">Агенты</button>
    <button data-tab="missions">Задания</button>
    <button data-tab="logs">Логи</button>
    <button data-tab="scanner">Сканер</button>
    <button data-tab="terminal">Терминал</button>
  </div>

  <div id="content">

    <div class="tab active" id="profile">
      <h2>ДОСЬЕ</h2>
      <p>Имя: Jay Forsyth</p>
      <p>Организация: FIB</p>
      <p>Ранг: Агент</p>
    </div>

    <div class="tab" id="agents">
      <h2>АГЕНТЫ</h2>
      <div class="card">Agent #1 — Активен</div>
      <div class="card">Agent #2 — В миссии</div>
    </div>

    <div class="tab" id="missions">
      <h2>ЗАДАНИЯ</h2>
      <div class="card">Операция "Тень" — Активна</div>
      <div class="card">Наблюдение — Завершено</div>
    </div>

    <div class="tab" id="logs">
      <h2>ЛОГИ</h2>
      <p>> Вход в систему</p>
      <p>> Доступ разрешен</p>
    </div>

    <div class="tab" id="scanner">
      <h2>СКАНЕР</h2>
      <input placeholder="Введите имя">
      <button>Сканировать</button>
    </div>

    <div class="tab" id="terminal">
      <h2>ТЕРМИНАЛ</h2>
      <div id="terminal-box"></div>
      <input id="terminal-input" placeholder="Введите команду">
    </div>

  </div>

</div>

<div id="notifications"></div>

<script src="script.js"></script>
</body>
</html>
