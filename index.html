<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>KVENTA SYSTEM</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
</head>

<body data-state="normal">

<div id="bg"></div>

<!-- HUD -->
<div id="hud">
  <div>KVENTA SYSTEM</div>
  <div>Agent: je1nn ● ONLINE</div>
</div>

<!-- AUTH -->
<div id="auth">
  <div class="auth-panel">
    <h1>АВТОРИЗАЦИЯ</h1>
    <input placeholder="Никнейм">
    <input placeholder="Пароль" type="password">
    <button id="login-btn">ВОЙТИ</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <div id="sidebar">
    <button data-tab="profile" class="active">Профиль</button>
    <button data-tab="agents">Агенты</button>
    <button data-tab="missions">Задания</button>
    <button data-tab="logs">Логи</button>
    <button data-tab="scanner">Сканер</button>
    <button data-tab="terminal">Терминал</button>
  </div>

  <div id="content">

    <div class="tab active" id="profile">
      <div class="card">
        <h2>ДОСЬЕ</h2>
        <p>Jay Forsyth</p>
        <p>FIB</p>
        <p>Агент</p>
      </div>
    </div>

    <div class="tab" id="agents">
      <div class="card">АГЕНТЫ</div>
    </div>

    <div class="tab" id="missions">
      <div class="card">ЗАДАНИЯ</div>
    </div>

    <div class="tab" id="logs">
      <div class="card">ЛОГИ</div>
    </div>

    <div class="tab" id="scanner">
      <div class="card">СКАНЕР</div>
    </div>

    <div class="tab" id="terminal">
      <div class="card">ТЕРМИНАЛ</div>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
