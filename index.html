<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KVENTA SYSTEM</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

</head>
<body>

<div id="app">

  <!-- ФОН -->
  <div id="bg"></div>

  <!-- ПАНЕЛЬ АВТОРИЗАЦИИ -->
  <div id="auth-panel">

    <div class="logo"></div>

    <input id="login" type="text" placeholder="Никнейм" autocomplete="off">
    <input id="password" type="password" placeholder="Пароль" autocomplete="off">

    <button id="login-btn">ВОЙТИ</button>
    <button id="guest-btn">ГОСТЬ</button>

    <div class="hint">
      Если не удается войти — обратитесь к руководству организации
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
