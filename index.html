<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>KVENTA SYSTEM</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<div id="bg"></div>

<!-- AUTH -->
<div id="auth">

  <div class="panel">

    <h1>АВТОРИЗАЦИЯ</h1>

    <input id="login" placeholder="Никнейм">
    <input id="password" type="password" placeholder="Пароль">

    <button id="login-btn">ВОЙТИ</button>
    <button id="guest-btn">ГОСТЬ</button>

    <div id="status"></div>

  </div>

</div>

<!-- MAIN -->
<div id="main">

  <div id="sidebar">
    <button data-tab="profile" class="active">Профиль</button>
    <button data-tab="files">Файлы</button>
    <button data-tab="logs">Логи</button>
    <button data-tab="missions">Задания</button>
    <button data-tab="scanner">Сканер</button>
    <button data-tab="terminal">Терминал</button>
  </div>

  <div id="content">

    <div class="tab active" id="profile">
      <h2>ДОСЬЕ</h2>
      <p>Jay Forsyth</p>
      <p>Разведка / FIB</p>
    </div>

    <div class="tab" id="files"></div>
    <div class="tab" id="logs"></div>
    <div class="tab" id="missions"></div>
    <div class="tab" id="scanner"></div>
    <div class="tab" id="terminal"></div>

  </div>

</div>

<div id="notifications"></div>

<script src="script.js"></script>
</body>
</html>
