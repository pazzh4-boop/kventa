<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>KVENTA SYSTEM</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<div id="bg"></div>

<!-- HUD -->
<div id="hud">
  <div class="hud-left">KVENTA SYSTEM</div>
  <div class="hud-right">
    <span id="user-role">FIB</span>
    <span id="system-status">● ONLINE</span>
  </div>
</div>

<!-- AUTH -->
<div id="auth">
  <div class="panel">
    <h1>АВТОРИЗАЦИЯ</h1>

    <input id="login" placeholder="Никнейм">
    <input id="password" type="password" placeholder="Пароль">

    <button id="login-btn">ВОЙТИ</button>
    <button id="guest-btn">ГОСТЬ</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <div id="sidebar">
    <button data-tab="profile" class="active">Профиль</button>
    <button data-tab="agents">Агенты</button>
    <button data-tab="missions">Задания</button>
    <button data-tab="logs">Логи</button>
    <button data-tab="scanner">Сканер</button>
    <button data-tab="terminal">Терминал</button>
  </div>

  <div id="content">

    <!-- PROFILE -->
    <div class="tab active" id="profile">
      <h2>ДОСЬЕ</h2>
      <p>Имя: Jay Forsyth</p>
      <p>Организация: FIB</p>
      <p>Ранг: Агент</p>
    </div>

    <!-- AGENTS -->
    <div class="tab" id="agents">

      <div class="agent-list">

        <div class="agent-card"
        onclick="selectAgent(event,'Agent #1','Активен','Разведка',12,'assets/agent1.jpg')">

          <img src="assets/agent1.jpg" class="agent-avatar">
          <div>
            <b>Agent #1</b><br>
            <span class="level-badge">LVL 12</span><br>
            Статус: Активен
          </div>
        </div>

        <div class="agent-card"
        onclick="selectAgent(event,'Agent #2','В миссии','Поддержка',7,'assets/agent2.jpg')">

          <img src="assets/agent2.jpg" class="agent-avatar">
          <div>
            <b>Agent #2</b><br>
            <span class="level-badge">LVL 7</span><br>
            Статус: В миссии
          </div>
        </div>

      </div>

      <div id="agent-details"></div>

    </div>

    <!-- MISSIONS -->
    <div class="tab" id="missions">

      <h2>ЗАДАНИЯ</h2>

      <div class="mission-card"
      onclick="openMission('Операция Тень','Проникновение','Активна')">

        <div class="mission-title">Операция "Тень"</div>
        <div class="mission-status status-active">Активна</div>

      </div>

      <div class="mission-card">

        <div class="mission-title">Наблюдение</div>
        <div class="mission-status status-done">Завершено</div>

      </div>

    </div>

    <!-- LOGS -->
    <div class="tab" id="logs">
      <h2>ЛОГИ</h2>
      <p>> Вход в систему</p>
    </div>

    <!-- SCANNER -->
    <div class="tab" id="scanner">
      <h2>СКАНЕР</h2>
      <button onclick="scanPerson()">СКАНИРОВАТЬ</button>
      <div id="scan-result"></div>
    </div>

    <!-- TERMINAL -->
    <div class="tab" id="terminal">
      <h2>ТЕРМИНАЛ</h2>
      <div id="terminal-box"></div>
      <input id="terminal-input" placeholder="Введите команду">
    </div>

  </div>

</div>

<div id="windows"></div>
<div id="notifications"></div>

<script src="script.js"></script>
</body>
</html>
