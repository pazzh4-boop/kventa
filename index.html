<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KVENTA SYSTEM</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

</head>
<body>

<div id="auth-screen">

  <!-- ФОН UI -->
  <div id="ui"></div>

  <!-- ПРАВАЯ ПАНЕЛЬ -->
  <div id="right-panel">

    <input 
      id="login" 
      type="text" 
      placeholder="Никнейм"
      autocomplete="off"
    >

    <input 
      id="password" 
      type="password" 
      placeholder="Пароль"
      autocomplete="off"
    >

    <button id="alt-btn">
      ГОСТЬ
    </button>

    <button id="login-btn">
      ВОЙТИ
    </button>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
