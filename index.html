<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>KVENTA SYSTEM</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<div id="bg"></div>

<!-- HUD -->
<div id="hud">
  <div>KVENTA SYSTEM</div>
  <div>Agent: je1nn | ● ONLINE</div>
</div>

<!-- AUTH -->
<div id="auth">
  <div class="panel">
    <h1>АВТОРИЗАЦИЯ</h1>

    <input id="login" placeholder="Никнейм">
    <input id="password" type="password" placeholder="Пароль">

    <button id="login-btn">ВОЙТИ</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <button data-tab="profile" class="active">Профиль</button>
    <button data-tab="agents">Агенты</button>
    <button data-tab="missions">Задания</button>
    <button data-tab="logs">Логи</button>
    <button data-tab="scanner">Сканер</button>
    <button data-tab="terminal">Терминал</button>
  </div>

  <!-- CONTENT -->
  <div id="content">

    <!-- PROFILE -->
    <div class="tab active" id="profile">
      <div class="card big">
        <h2>ДОСЬЕ</h2>

        <div class="grid">
          <div><span>Имя</span><b>Jay Forsyth</b></div>
          <div><span>Организация</span><b>FIB</b></div>
          <div><span>Ранг</span><b>Агент</b></div>
        </div>
      </div>
    </div>

    <!-- AGENTS -->
    <div class="tab" id="agents">

      <div class="split">

        <div class="list">

          <div class="agent active">
            <div class="avatar"></div>
            <div>
              <b>Agent #1</b>
              <span>Активен</span>
            </div>
          </div>

          <div class="agent">
            <div class="avatar"></div>
            <div>
              <b>Agent #2</b>
              <span>В миссии</span>
            </div>
          </div>

        </div>

        <div class="details card">
          <h3>Agent #1</h3>
          <p>Статус: Активен</p>
          <p>Роль: Разведка</p>
        </div>

      </div>

    </div>

    <!-- MISSIONS -->
    <div class="tab" id="missions">

      <div class="card">
        <h2>Операция "Тень"</h2>

        <div class="progress">
          <div class="bar"></div>
        </div>

        <span>В процессе</span>
      </div>

    </div>

    <!-- LOGS -->
    <div class="tab" id="logs">
      <div class="card">
        <h2>ЛОГИ</h2>
        <div class="logs">
          <div>> система активна</div>
        </div>
      </div>
    </div>

    <!-- SCANNER -->
    <div class="tab" id="scanner">
      <div class="card">
        <h2>БАЗА</h2>
        <input placeholder="Поиск">
      </div>
    </div>

    <!-- TERMINAL -->
    <div class="tab" id="terminal">
      <div class="card">
        <h2>ТЕРМИНАЛ</h2>
        <div class="logs"></div>
      </div>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
